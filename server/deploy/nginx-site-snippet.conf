# Clean URLs: /ringdhantu → ringdhantu.html (same idea as Express URL_REWRITES in server/index.js)
location = /ringdhantu {
  try_files /ringdhantu.html =404;
}
location = /kundli {
  try_files /kundli.html =404;
}
location = /lp/kundli {
  try_files /lp/kundli.html =404;
}
location = /kundli-preview {
  try_files /kundli-preview.html =404;
}
location = /consultancy {
  try_files /consultancy.html =404;
}
location = /contact {
  try_files /contact-us.html =404;
}
location = /tracking {
  try_files /tracking.html =404;
}
location = /metal-finder {
  try_files /free-metal-finder-tool.html =404;
}
location = /products/kundli-checkout {
  try_files /products/kundli-checkout/index.html =404;
}
location = /products/consultancy-checkout {
  try_files /products/consultancy-checkout/index.html =404;
}
location = /lp/kundli-checkout {
  try_files /lp/kundli-checkout/index.html =404;
}

